<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Test</title>
</head>
<body>
    <h1>Direct Login API Test</h1>
    <button onclick="testLogin()">Test Login with admin@mail.com</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';

            const payload = {
                email: "admin@mail.com",
                password: "HAKI"
            };

            console.log('Testing with payload:', payload);
            console.log('Email type:', typeof payload.email);
            console.log('Password type:', typeof payload.password);

            try {
                const response = await fetch('https://ahni-erp-029252c2fbb9.herokuapp.com/api/v1/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.text();
                console.log('Response status:', response.status);
                console.log('Response data:', data);

                result.innerHTML = `
                    <h3>Response:</h3>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Data:</strong> <pre>${data}</pre></p>
                `;
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
