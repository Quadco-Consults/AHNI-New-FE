<!DOCTYPE html>
<html>
<head>
    <title>Token Debug</title>
</head>
<body>
    <h1>Token Debugging Results</h1>
    <div id="results"></div>

    <script>
        function debugTokens() {
            const results = [];

            // Check all possible token storage keys
            console.log('🔍 All Token Storage Keys:');
            results.push('🔍 All Token Storage Keys:');

            const tokenKeys = ['token', 'accessToken', 'access_token', 'authToken', 'jwt'];
            tokenKeys.forEach(key => {
                const value = localStorage.getItem(key);
                console.log(`${key}:`, value);
                results.push(`${key}: ${value ? value.substring(0, 50) + '...' : 'null'}`);
            });

            // Check all localStorage keys that might contain tokens
            console.log('\n📦 All localStorage keys:');
            results.push('\n📦 All localStorage keys:');

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                if (value && (value.startsWith('eyJ') || key.toLowerCase().includes('token'))) {
                    console.log(`${key}:`, value.substring(0, 50) + '...');
                    results.push(`${key}: ${value.substring(0, 50)}...`);
                }
            }

            // Test what's actually being sent in the Authorization header
            const actualToken = localStorage.getItem('token') || localStorage.getItem('accessToken');
            console.log('\n🔐 Token being used:', actualToken ? actualToken.substring(0, 50) + '...' : 'None');
            results.push(`\n🔐 Token being used: ${actualToken ? actualToken.substring(0, 50) + '...' : 'None'}`);

            // Decode the actual token to verify user ID
            if (actualToken && actualToken !== 'undefined') {
                try {
                    const base64Url = actualToken.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));

                    const payload = JSON.parse(jsonPayload);
                    console.log('\n👤 JWT User Info:');
                    results.push('\n👤 JWT User Info:');

                    console.log('User ID:', payload.user_id);
                    console.log('Email:', payload.email);
                    console.log('Expires:', new Date(payload.exp * 1000));
                    console.log('Is Expired:', Date.now() > payload.exp * 1000);
                    console.log('Matches target user:', payload.user_id === '65a6e78c-01ba-43a7-8f10-ad59e771f94f');

                    results.push(`User ID: ${payload.user_id}`);
                    results.push(`Email: ${payload.email}`);
                    results.push(`Expires: ${new Date(payload.exp * 1000)}`);
                    results.push(`Is Expired: ${Date.now() > payload.exp * 1000}`);
                    results.push(`Matches target user: ${payload.user_id === '65a6e78c-01ba-43a7-8f10-ad59e771f94f'}`);
                } catch (e) {
                    console.error('Error decoding token:', e);
                    results.push(`Error decoding token: ${e.message}`);
                }
            }

            // Display results on page
            document.getElementById('results').innerHTML = results.map(r => `<p>${r}</p>`).join('');
        }

        // Run debugging when page loads
        window.onload = debugTokens;
    </script>

    <h3>Quick Fixes:</h3>

    <button onclick="copyTokenFix()">Fix 1: Copy 'token' to 'accessToken'</button>
    <button onclick="clearAllTokens()">Fix 2: Clear All Tokens (Re-login Required)</button>

    <div id="fixResults"></div>

    <script>
        function copyTokenFix() {
            const token = localStorage.getItem('token');
            if (token && token !== 'undefined') {
                localStorage.setItem('accessToken', token);
                document.getElementById('fixResults').innerHTML = '<p style="color: green;">✅ Copied token to accessToken - try your update again!</p>';
                console.log('✅ Copied token to accessToken');
            } else {
                document.getElementById('fixResults').innerHTML = '<p style="color: red;">❌ No valid token found to copy</p>';
            }
        }

        function clearAllTokens() {
            localStorage.removeItem('token');
            localStorage.removeItem('accessToken');
            localStorage.removeItem('access_token');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('refresh_token');
            document.getElementById('fixResults').innerHTML = '<p style="color: orange;">🔄 Cleared all tokens - please login again at <a href="/auth/login">/auth/login</a></p>';
            console.log('🔄 Cleared all tokens - please login again');
        }
    </script>
</body>
</html>
