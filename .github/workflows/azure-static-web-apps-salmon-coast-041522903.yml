name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      
      - name: Verify Node.js version
        run: |
          echo "Node version: $(node --version)"
          echo "Yarn version: $(yarn --version)"
          node --version | grep -q "v20" || (echo "Error: Node.js 20.x required" && exit 1)
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile --production=false
      
      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production
      
      - name: Verify and clean build output
        run: |
          echo "=== Checking build directories ==="
          ls -lah
          
          if [ -d "out" ]; then
            echo "✓ Static export 'out' directory found"
            echo "Build output size before cleanup:"
            du -sh out/
            
            # Remove source maps (saves 100-200MB)
            find out/ -name "*.map" -type f -delete
            
            # Remove any development files
            find out/ -name "*.development.js" -type f -delete
            
            echo "Build output size after cleanup:"
            du -sh out/
            
            echo "=== Top 20 largest files in out/ ==="
            find out/ -type f -exec du -h {} + | sort -rh | head -20
          else
            echo "ERROR: 'out' directory not found!"
            echo "Make sure next.config.js has output: 'export'"
            exit 1
          fi
          
          # Remove .next directory (not needed for deployment)
          if [ -d ".next" ]; then
            echo "Removing .next directory (not needed for deployment)..."
            rm -rf .next
          fi
          
          # Final size check
          TOTAL_SIZE=$(du -sb out/ | cut -f1)
          SIZE_LIMIT=524288000
          echo "Total size: $TOTAL_SIZE bytes"
          echo "Size limit: $SIZE_LIMIT bytes"
          
          if [ $TOTAL_SIZE -gt $SIZE_LIMIT ]; then
            echo "ERROR: Build exceeds 500MB limit!"
            echo "Current size: $(du -sh out/)"
            exit 1
          else
            echo "✓ Build size is within limits"
          fi
      
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client --legacy-peer-deps
      
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}
          action: "upload"
          app_location: "/"
          api_location: "" # No API folder - static export only
          output_location: "out" # CRITICAL: Deploy the 'out' folder, not '.next'
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
        env:
          NODE_VERSION: '20'
          IS_STATIC_EXPORT: true
                
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}