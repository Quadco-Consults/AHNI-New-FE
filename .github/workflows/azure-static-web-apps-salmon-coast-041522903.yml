name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      
      - name: Verify Node.js version
        run: |
          echo "Node version: $(node --version)"
          echo "Yarn version: $(yarn --version)"
          node --version | grep -q "v20" || (echo "Error: Node.js 20.x required" && exit 1)
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile --production=false
      
      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production
      
      # For standalone builds, Next.js outputs to .next/standalone
      - name: Prepare deployment files
        run: |
          echo "Build completed. Checking output..."
          ls -lah .next/
          
          # Note: Azure Static Web Apps doesn't support Next.js API routes natively
          # You need to deploy to Azure App Service instead or remove API routes
          
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client --legacy-peer-deps
      
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      
      # WARNING: This deployment will fail with API routes
      # Azure Static Web Apps doesn't support Next.js API routes
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}
          action: "upload"
          app_location: "/"
          output_location: ".next"
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
        env:
          NODE_VERSION: '20'
                
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}