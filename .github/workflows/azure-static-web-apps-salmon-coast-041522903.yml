name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile --production=false
      
      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production
      
      # Remove unnecessary files from out directory
      - name: Clean build output
        run: |
          echo "Build output size before cleanup:"
          du -sh .next/
          
          # Remove source maps (largest contributor to size)
          find .next/ -name "*.map" -type f -delete
          
          # Remove .next cache if present
          rm -rf .next/.next/cache
          
          # Remove build info
          rm -rf .next/.next/build-info.json
          
          echo "Build output size after cleanup:"
          du -sh .next/
          ls -lah .next/
      
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client --legacy-peer-deps
      
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}
          action: "upload"
          app_location: "/"
          output_location: ".next"
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
        env:
          NODE_VERSION: '20'
          IS_STATIC_EXPORT: true
                
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_COAST_041522903 }}