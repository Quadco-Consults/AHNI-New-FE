name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build --build-arg BASE_URL=${{ secrets.BASE_URL }} -t ${{ secrets.DOCKER_HUB_USERNAME }}/ahni-client:latest .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ahni-client:latest
      
      - name: Retrieve SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_PRIVATE_KEY }}" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      
      - name: Copy files to DigitalOcean
        run: |
          scp  -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r ./configs/docker-compose.yml ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:~/app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH into DigitalOcean Droplet and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_PRIVATE_KEY }}
          script: |
            cd ~/app
            export $(cat .env|xargs)
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME}} -p ${{ secrets.DOCKER_HUB_PASSWORD }}
            docker compose pull
            docker compose up -d
      - name: Notify deployment status
        run: echo "Deployment Completed"
