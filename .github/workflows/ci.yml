name: Build and Push Docker Image

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Vite app
        run: yarn build

      - name: Archive Production Artifacts
        run: tar -czf dist.tar.gz dist
        continue-on-error: false

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: vite-build
          path: dist.tar.gz

      # - name: Log in to Docker Hub
      #   run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      # - name: Build Docker image
      #   run: docker build --build-arg BASE_URL=${{ secrets.BASE_URL }} -t ${{ secrets.DOCKER_HUB_USERNAME }}/ahni-client:latest .

      # - name: Push Docker image to Docker Hub
      #   run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ahni-client:latest
      
      # - name: Retrieve SSH key
      #   run: |
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.DROPLET_PRIVATE_KEY }}" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      
      # - name: Copy files to DigitalOcean
      #   run: |
      #     scp  -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r ./configs/docker-compose.yml ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:~/app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: vite-build

      - name: SSH into DigitalOcean Droplet and Deploy
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_PRIVATE_KEY }}
          source: "dist.tar.gz"
          target: "/var/www/html/vite-app"
      
      - name: Extract Build on Droplet
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_PRIVATE_KEY }}
          script: |
            cd /var/www/html/vite-app
            tar -xzf dist.tar.gz
            rm dist.tar.gz
      
      - name: Reload Nginx
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl reload nginx
      
      - name: Notify deployment status
        run: echo "Deployment Completed"
