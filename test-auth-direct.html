<!DOCTYPE html>
<html>
<head>
    <title>Direct Auth Test</title>
</head>
<body>
    <h1>Direct Authentication Test</h1>
    <button onclick="testAuth()">Test Auth & Update</button>
    <div id="results"></div>

    <script>
        async function testAuth() {
            const results = [];
            const resultsDiv = document.getElementById('results');

            try {
                // Get all possible tokens
                const token = localStorage.getItem('token');
                const accessToken = localStorage.getItem('accessToken');
                const access_token = localStorage.getItem('access_token');

                results.push('🔍 Available Tokens:');
                results.push(`token: ${token ? token.substring(0, 30) + '...' : 'null'}`);
                results.push(`accessToken: ${accessToken ? accessToken.substring(0, 30) + '...' : 'null'}`);
                results.push(`access_token: ${access_token ? access_token.substring(0, 30) + '...' : 'null'}`);

                // Use the first available token
                const useToken = token || accessToken || access_token;

                if (!useToken) {
                    results.push('❌ No token found - please login first');
                    resultsDiv.innerHTML = results.map(r => `<p>${r}</p>`).join('');
                    return;
                }

                results.push(`\n🔑 Using token: ${useToken.substring(0, 30)}...`);

                // Test 1: Profile endpoint (GET)
                results.push('\n📋 Test 1: GET Profile');
                const profileResponse = await fetch('https://ahni-erp-029252c2fbb9.herokuapp.com/api/v1/users/profile/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${useToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                results.push(`Status: ${profileResponse.status} ${profileResponse.statusText}`);

                if (profileResponse.ok) {
                    const profileData = await profileResponse.json();
                    results.push(`✅ Profile GET successful`);
                    results.push(`User ID: ${profileData.id}`);
                    results.push(`Email: ${profileData.email}`);
                } else {
                    const errorText = await profileResponse.text();
                    results.push(`❌ Profile GET failed: ${errorText}`);
                }

                // Test 2: Direct PATCH with minimal data
                results.push('\n🔧 Test 2: PATCH User Profile');
                const patchResponse = await fetch('https://ahni-erp-029252c2fbb9.herokuapp.com/api/v1/users/65a6e78c-01ba-43a7-8f10-ad59e771f94f/', {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${useToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        first_name: 'Test Update ' + Date.now()
                    })
                });

                results.push(`PATCH Status: ${patchResponse.status} ${patchResponse.statusText}`);

                if (patchResponse.ok) {
                    const patchData = await patchResponse.json();
                    results.push(`✅ PATCH successful!`);
                    results.push(`Response: ${JSON.stringify(patchData, null, 2)}`);
                } else {
                    const errorText = await patchResponse.text();
                    results.push(`❌ PATCH failed: ${errorText}`);
                }

                // Test 3: Check token validity
                if (useToken && useToken !== 'undefined') {
                    try {
                        const base64Url = useToken.split('.')[1];
                        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                        }).join(''));

                        const payload = JSON.parse(jsonPayload);
                        results.push('\n👤 JWT Token Info:');
                        results.push(`User ID: ${payload.user_id}`);
                        results.push(`Email: ${payload.email}`);
                        results.push(`Username: ${payload.username}`);
                        results.push(`Expires: ${new Date(payload.exp * 1000)}`);
                        results.push(`Is Expired: ${Date.now() > payload.exp * 1000}`);
                        results.push(`Target User Match: ${payload.user_id === '65a6e78c-01ba-43a7-8f10-ad59e771f94f'}`);
                    } catch (e) {
                        results.push(`\n❌ Token decode error: ${e.message}`);
                    }
                }

            } catch (error) {
                results.push(`\n🚨 Test failed: ${error.message}`);
            }

            resultsDiv.innerHTML = results.map(r => `<p style="font-family: monospace;">${r}</p>`).join('');
        }

        // Auto-run on load
        window.onload = () => {
            setTimeout(testAuth, 500);
        };
    </script>
</body>
</html>
